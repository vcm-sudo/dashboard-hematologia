const { useState, useEffect, useMemo, useRef, useCallback } = React;
const { PieChart, Pie, Cell, BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, LineChart, Line } = Recharts;

// ─── Storage ─────────────────────────────────────────────
const KEY = 'hema_v3';
const KEY_APIKEY = 'hema_apikey';
const KEY_FS_GRANTED = 'hema_fs_granted';
const load = () => { try { return JSON.parse(localStorage.getItem(KEY) || '[]'); } catch { return []; } };
const save = (d) => { try { localStorage.setItem(KEY, JSON.stringify(d)); } catch {} };
const loadKey = () => localStorage.getItem(KEY_APIKEY) || '';
const saveKey = (k) => localStorage.setItem(KEY_APIKEY, k);

// ─── IndexedDB — persiste o handle da pasta entre reloads ─
const IDB_NAME = 'hema_fs_v1';
const IDB_STORE = 'handles';

function openIDB() {
  return new Promise((res, rej) => {
    const req = indexedDB.open(IDB_NAME, 1);
    req.onupgradeneeded = (e) => e.target.result.createObjectStore(IDB_STORE);
    req.onsuccess = (e) => res(e.target.result);
    req.onerror = () => rej(req.error);
  });
}
async function storeHandleIDB(handle) {
  try {
    const db = await openIDB();
    await new Promise((res, rej) => {
      const tx = db.transaction(IDB_STORE, 'readwrite');
      tx.objectStore(IDB_STORE).put(handle, 'sync_dir');
      tx.oncomplete = res;
      tx.onerror = () => rej(tx.error);
    });
  } catch(e) { console.warn('IDB store:', e); }
}
async function getHandleIDB() {
  try {
    const db = await openIDB();
    return new Promise((res) => {
      const tx = db.transaction(IDB_STORE, 'readonly');
      const req = tx.objectStore(IDB_STORE).get('sync_dir');
      req.onsuccess = () => res(req.result || null);
      req.onerror = () => res(null);
    });
  } catch { return null; }
}

// ─── File System Access ───────────────────────────────────
// _dirHandle: handle ativo com permissão garantida
// _pendingHandle: handle salvo no IDB mas que precisa de gesto do usuário para reautorizar
let _dirHandle = null;
let _pendingHandle = null;

async function pickFolder() {
  const handle = await window.showDirectoryPicker({ mode: 'readwrite' });
  _dirHandle = handle;
  _pendingHandle = null;
  await storeHandleIDB(handle);
  localStorage.setItem(KEY_FS_GRANTED, handle.name);
  return handle;
}

// Tenta restaurar o handle do IDB sem precisar de interação do usuário.
// Retorna o handle se a permissão já estiver concedida, null caso contrário
// (nesse caso _pendingHandle fica populado para uso no próximo gesto).
async function restoreFolder() {
  const handle = await getHandleIDB();
  if (!handle) return null;
  try {
    const perm = await handle.queryPermission({ mode: 'readwrite' });
    if (perm === 'granted') {
      _dirHandle = handle;
      localStorage.setItem(KEY_FS_GRANTED, handle.name);
      return handle;
    }
    if (perm === 'prompt') _pendingHandle = handle;
  } catch {}
  return null;
}

async function saveToFolder(jsonContent) {
  if (!_dirHandle) throw new Error('NEED_FOLDER');
  const fh = await _dirHandle.getFileHandle('pacientes.json', { create: true });
  const w = await fh.createWritable();
  await w.write(jsonContent);
  await w.close();
}

// ─── Helpers ──────────────────────────────────────────────

  Upload:   <><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></>,
};
const I = ({n, s=14, ...r}) => <Ic p={Icons[n]} s={s} {...r}/>;

// ─── Status colours ───────────────────────────────────────
const SC = {
  'Em tratamento':       ['#FBEEF0','#8B2C3E'],
  'Em investigação':     ['#FEF5E7','#9C6F1A'],
  'Primeira consulta':   ['#E7F0F5','#2D5F7C'],

const statPill = (s) => { const c = SC[s]||['#F0EDE6','#5C5C5C']; return { background:c[0], color:c[1] }; };
const PAL = ['#8B2C3E','#2D5F7C','#5C7A6B','#A8826B','#7A5C7A','#B8956A','#5C5C7A','#956A6A','#6A7A8B','#7A6B5C'];

const TC = {

};
const TERAPIAS_OPTIONS = Object.keys(TC);
const terapiaPill = (t) => { const c = TC[t]||['#F0EDE6','#5C5C5C']; return { background:c[0], color:c[1] }; };

// ─── Normalise name ───────────────────────────────────────
const normName = (n='') => n.trim().toUpperCase().replace(/\s+/g,' ');

// ─── Claude vision extractor ──────────────────────────────
async function extractPatientsFromImage(base64, mediaType, apiKey) {
  const prompt = `Você está olhando para uma print de uma agenda médica hospitalar.
Extraia TODOS os nomes de pacientes visíveis (ignore linhas como "FECHOU HORARIO", "REUNIAO" ou bloqueios de agenda).
Para cada paciente, extraia o que for visível: nome completo, número de prontuário (se aparecer antes do nome), número de atendimento, horário.
A data de hoje é ${today()}.

Retorne APENAS um array JSON válido, sem markdown, sem explicação. Formato exato:
[
  {
    "nome": "NOME COMPLETO DO PACIENTE",
    "prontuario": "123456",
    "atendimento": "7037268",
    "data": "${today()}",
    "hora": "09:00"
  }
]
Se algum campo não for visível, omita-o ou use null. Retorne só o JSON, nada mais.`;

  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-6',
      max_tokens: 2000,
      messages: [{
        role: 'user',
        content: [
          { type: 'image', source: { type: 'base64', media_type: mediaType, data: base64 } },
          { type: 'text', text: prompt }
        ]
      }]
    })
  });

  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err?.error?.message || `HTTP ${res.status}`);
  }

  const data = await res.json();
  const text = data.content?.find(b => b.type === 'text')?.text || '';
  const cleaned = text.replace(/```json|```/g,'').trim();
  return JSON.parse(cleaned);
}

// ─── Main App ─────────────────────────────────────────────
function App() {
  const [patients, setPatients]     = useState(load);
  const [apiKey, setApiKey]         = useState(loadKey);
  const [fsGranted, setFsGranted]   = useState(!!localStorage.getItem(KEY_FS_GRANTED));
  const [syncPending, setSyncPending] = useState(false);
  const [fsSaving, setFsSaving]     = useState(false);
  const [lastSync, setLastSync]     = useState(null);
  const [view, setView]             = useState('list');
  const [activeId, setActiveId]     = useState(null);
  const [search, setSearch]         = useState('');
  const [filters, setFilters]       = useState({diagnostico:'todos',convenio:'todos',tratamento:'todos',terapia:'todos',status:'todos'});
  const [showAdd, setShowAdd]       = useState(false);
  const [showImport, setShowImport] = useState(false);
  const [showKey, setShowKey]       = useState(false);
  const [toast, setToast]           = useState(null);
  const [tab, setTab]               = useState('lista');
  const [sort, setSort]             = useState({key:'ultimaConsulta', dir:'desc'});
  const [consultaPeriod, setConsultaPeriod] = useState('mes');
  const [hiddenDx, setHiddenDx]     = useState([]);   // diagnósticos ocultos no donut

  // Persiste no localStorage
  useEffect(() => save(patients), [patients]);

  // Ao montar: tenta restaurar o handle da pasta sem pedir permissão ao usuário
  useEffect(() => {
    restoreFolder().then(handle => {
      if (handle) {
        setFsGranted(true);
        setSyncPending(false);
      } else if (_pendingHandle) {
        // Pasta foi selecionada antes, mas precisa de clique para reautorizar
        setFsGranted(true);
        setSyncPending(true);
      }
    });
  }, []);

  const msg = (m, type='ok') => { setToast({m, type}); setTimeout(()=>setToast(null), 3500); };

  const uniq = (k) => [...new Set(patients.map(p => p[k]).filter(Boolean))].sort();

  // ── CRUD ──
  const upsertFromAgenda = (extracted) => {
    let added=0, updated=0;
    setPatients(prev => {
      let next = [...prev];
      for (const e of extracted) {
        const nNorm = normName(e.nome);
        const idx = next.findIndex(p => normName(p.nome) === nNorm || (e.prontuario && p.prontuario === e.prontuario));
        const consulta = { id:uid(), data:e.data||today(), hora:e.hora||'', atendimento:e.atendimento||'', obs:'' };
        if (idx >= 0) {
          const p = {...next[idx]};
          const alreadyExists = p.consultas?.some(c => c.atendimento && c.atendimento === consulta.atendimento);
          if (!alreadyExists) {
            p.consultas = [...(p.consultas||[]), consulta].sort((a,b)=>b.data.localeCompare(a.data));
            p.ultimaConsulta = p.consultas[0].data;
            next[idx] = p;
            updated++;
          }
        } else {
          next.push({ id:uid(), nome:e.nome, prontuario:e.prontuario||'', idade:null, diagnostico:'', convenio:'', tratamento:'', status:'', consultas:[consulta], ultimaConsulta:consulta.data, createdAt:new Date().toISOString() });
          added++;
        }
      }
      return next;
    });
    return {added, updated};
  };

  const savePatient = (data) => {
    if (data.id) {
      setPatients(prev => prev.map(p => p.id === data.id ? {...p, ...data} : p));
      msg('Paciente atualizado');
    } else {
      setPatients(prev => [...prev, {...data, id:uid(), consultas:[], createdAt:new Date().toISOString()}]);
      msg('Paciente adicionado');
    }
    setShowAdd(false);
  };

  const deletePatient = (id) => {
    setPatients(prev => prev.filter(p => p.id !== id));
    if (activeId === id) { setView('list'); setActiveId(null); }
    msg('Paciente removido');
  };

  const addConsulta = (patientId, consulta) => {
    setPatients(prev => prev.map(p => {
      if (p.id !== patientId) return p;
      const consultas = [...(p.consultas||[]), {...consulta, id:uid()}].sort((a,b)=>b.data.localeCompare(a.data));
      return {...p, consultas, ultimaConsulta: consultas[0].data};
    }));
    msg('Consulta adicionada');
  };

  const editConsulta = (patientId, consulta) => {
    setPatients(prev => prev.map(p => {
      if (p.id !== patientId) return p;
      const consultas = p.consultas.map(c => c.id === consulta.id ? consulta : c).sort((a,b)=>b.data.localeCompare(a.data));
      return {...p, consultas, ultimaConsulta: consultas[0]?.data||''};
    }));
  };

  const deleteConsulta = (patientId, consultaId) => {
    setPatients(prev => prev.map(p => {
      if (p.id !== patientId) return p;
      const consultas = p.consultas.filter(c => c.id !== consultaId).sort((a,b)=>b.data.localeCompare(a.data));
      return {...p, consultas, ultimaConsulta: consultas[0]?.data||''};
    }));
  };

  const exportJSON = () => {
    const b = new Blob([JSON.stringify(patients, null,2)],{type:'application/json'});
    const u = URL.createObjectURL(b);
    const a = document.createElement('a'); a.href=u; a.download=`hema-${today()}.json`; a.click(); URL.revokeObjectURL(u);
  };
  const exportCSV = () => {
    const cols = ['nome','idade','prontuario','diagnostico','convenio','tratamento','terapias','status','ultimaConsulta'];
    const esc = v => `"${String(v??'').replace(/"/g,'""')}"`;
    const rows = [cols.join(',')];
    patients.forEach(p => rows.push(cols.map(c=>esc(c==='terapias'?(p.terapias||[]).join('; '):p[c])).join(',')));
    const b = new Blob(['﻿'+rows.join('\n')],{type:'text/csv;charset=utf-8'});
    const u = URL.createObjectURL(b); const a = document.createElement('a'); a.href=u; a.download=`hema-${today()}.csv`; a.click(); URL.revokeObjectURL(u);
  };

  // Importa pacientes de um arquivo .json (restaurar backup)
  const importFromJSON = () => {
    const input = document.createElement('input');
    input.type = 'file'; input.accept = '.json';
    input.onchange = (e) => {
      const file = e.target.files[0]; if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        try {
          const data = JSON.parse(ev.target.result);
          if (!Array.isArray(data)) throw new Error('Arquivo inválido');
          if (confirm(`Restaurar ${data.length} pacientes? Os dados atuais serão substituídos.`)) {
            setPatients(data);
            msg(`${data.length} pacientes restaurados do arquivo`);
          }
        } catch(err) { msg('Erro ao importar: ' + err.message, 'err'); }
      };
      reader.readAsText(file);
    };
    input.click();
  };

  const saveToFS = async (silent = false) => {
    setFsSaving(true);
    try {
      if (!_dirHandle) {
        // Tenta reautorizar com handle pendente (requer gesto do usuário)
        if (_pendingHandle) {
          const perm = await _pendingHandle.requestPermission({ mode: 'readwrite' });
          if (perm === 'granted') {
            _dirHandle = _pendingHandle;
            _pendingHandle = null;
            setFsGranted(true);
            setSyncPending(false);
            localStorage.setItem(KEY_FS_GRANTED, _dirHandle.name);
          } else {
            throw new Error('Permissão negada — selecione a pasta novamente.');
          }
        } else {
          await pickFolder();
          setFsGranted(true);
          setSyncPending(false);
        }
      }
      await saveToFolder(JSON.stringify(patients, null, 2));
      setLastSync(new Date());
      setSyncPending(false);
      if (!silent) msg(`Sincronizado: ${_dirHandle.name}/pacientes.json`);
    } catch(e) {
      if (e.name === 'AbortError') return;
      // Handle do pCloud ficou "stale" (drive remontado): descarta e tenta re-selecionar a pasta.
      if (e.name === 'NotFoundError') {
        _dirHandle = null; _pendingHandle = null;
        if (!silent) {
          try {
            await pickFolder();              // ainda dentro do gesto do clique
            setFsGranted(true); setSyncPending(false);
            await saveToFolder(JSON.stringify(patients, null, 2));
            setLastSync(new Date());
            msg(`Sincronizado: ${_dirHandle.name}/pacientes.json`);
          } catch(e2) {
            if (e2.name === 'AbortError') return;
            msg('A pasta do pCloud não foi encontrada (drive remontado). Clique no botão pCloud e selecione a pasta novamente.', 'err');
          }
        } else {
          setSyncPending(true);            // auto-save: pede clique do usuário
        }
        return;
      }
      if (!silent) msg('Erro ao sincronizar: ' + e.message, 'err');
      else setSyncPending(true);
    } finally {
      setFsSaving(false);
    }
  };

  // Auto-save 2s após qualquer alteração nos pacientes
  useEffect(() => {
    if (!fsGranted || !patients.length) return;
    if (!_dirHandle) {
      if (_pendingHandle) setSyncPending(true);
      return;
    }
    const t = setTimeout(() => saveToFS(true), 2000);
    return () => clearTimeout(t);
  }, [patients, fsGranted]);

  const filtered = useMemo(() => {
    const list = patients.filter(p => {
      if (search && !p.nome.toLowerCase().includes(search.toLowerCase())) return false;
      if (filters.diagnostico !== 'todos' && p.diagnostico !== filters.diagnostico) return false;
      if (filters.convenio !== 'todos' && p.convenio !== filters.convenio) return false;
      if (filters.tratamento !== 'todos' && p.tratamento !== filters.tratamento) return false;
      if (filters.terapia !== 'todos' && !(p.terapias||[]).includes(filters.terapia)) return false;
      if (filters.status !== 'todos' && p.status !== filters.status) return false;
      return true;
    });
    const val = (p) => {
      if (sort.key === 'consultas') return (p.consultas||[]).length;
      return (p[sort.key] || '').toString().toLowerCase();
    };
    const mul = sort.dir === 'asc' ? 1 : -1;
    return list.sort((a,b) => {
      const va = val(a), vb = val(b);
      const cmp = typeof va === 'number' ? va - vb : va.localeCompare(vb, 'pt-BR');
      return cmp !== 0 ? cmp * mul : a.nome.localeCompare(b.nome, 'pt-BR');
    });
  }, [patients, search, filters, sort]);

  // Clique no cabeçalho: mesmo campo inverte direção; campo novo começa asc (data e nº começam desc)
  const toggleSort = (key) => setSort(s =>
    s.key === key ? {key, dir: s.dir === 'asc' ? 'desc' : 'asc'}
                  : {key, dir: (key === 'ultimaConsulta' || key === 'consultas') ? 'desc' : 'asc'});

  const stats = useMemo(() => {
    const t = today(); const dx={}, conv={};
    patients.forEach(p => {
      if (p.diagnostico) dx[p.diagnostico]=(dx[p.diagnostico]||0)+1;
      if (p.convenio) conv[p.convenio]=(conv[p.convenio]||0)+1;
    });
    const topDx = Object.entries(dx).sort((a,b)=>b[1]-a[1])[0];
    const topCv = Object.entries(conv).sort((a,b)=>b[1]-a[1])[0];
    return { total:patients.length, hoje:patients.filter(p=>p.consultas?.some(c=>c.data===t)).length, topDx:topDx?.[0]||'—', topDxN:topDx?.[1]||0, topCv:topCv?.[0]||'—', topCvN:topCv?.[1]||0 };
  }, [patients]);

  const charts = useMemo(() => {
    const tally = k => { const m={}; filtered.forEach(p=>{const v=p[k]||'—'; m[v]=(m[v]||0)+1;}); return Object.entries(m).map(([n,v])=>({name:n,value:v})).sort((a,b)=>b.value-a.value); };
    const months = {}, weeks = {};
    // Segunda-feira (ISO) da semana de uma data YYYY-MM-DD
    const mondayOf = (iso) => {
      const d = new Date(iso + 'T00:00:00');
      const day = d.getDay();                 // 0=dom … 6=sáb
      d.setDate(d.getDate() + (day === 0 ? -6 : 1 - day));
      const mm = String(d.getMonth()+1).padStart(2,'0');
      const dd = String(d.getDate()).padStart(2,'0');
      return { key: `${d.getFullYear()}-${mm}-${dd}`, label: `${dd}/${mm}` };
    };
    filtered.forEach(p => (p.consultas||[]).forEach(c => {
      if (!c.data) return;
      const mk = c.data.slice(0,7); months[mk] = (months[mk]||0)+1;
      const w = mondayOf(c.data); weeks[w.key] = weeks[w.key] || { label: w.label, value: 0 }; weeks[w.key].value++;
    }));
    const terMap = {};
    filtered.forEach(p => (p.terapias||[]).forEach(t => { terMap[t] = (terMap[t]||0)+1; }));
    const ter = TERAPIAS_OPTIONS.filter(t=>terMap[t]).map(t=>({name:t, value:terMap[t]}));
    return {
      dx:tally('diagnostico'), conv:tally('convenio'), trat:tally('tratamento'), ter,
      mes:Object.entries(months).sort().map(([n,v])=>({name:n,value:v})),
      semana:Object.keys(weeks).sort().map(k=>({name:weeks[k].label, value:weeks[k].value})),
    };
  }, [filtered]);

  const activePatient = patients.find(p => p.id === activeId);
  const hasFilter = search || Object.values(filters).some(v=>v!=='todos');

  // Label do botão de sincronização
  const syncLabel = fsSaving ? 'Sincronizando…'
    : syncPending ? 'Clique p/ sincronizar'
    : fsGranted && lastSync ? `pCloud ✓ · ${fmtHM(lastSync)}`
    : fsGranted ? 'pCloud ✓'
    : 'pCloud Drive';
  const syncColor = syncPending ? '#B8860B' : fsGranted ? 'var(--accent3)' : 'var(--muted)';
  const syncIcon = fsSaving ? 'Loader' : syncPending ? 'Alert' : 'Up';
  const syncTitle = fsGranted
    ? `Pasta: ${localStorage.getItem(KEY_FS_GRANTED)||'pCloud'} — salva em pacientes.json`
    : 'Selecionar pasta do pCloud Drive';

  return (
    <div style={{minHeight:'100vh'}}>
      {/* HEADER */}
      <header style={{borderBottom:'1px solid var(--border)',background:'var(--surface)',position:'sticky',top:0,zIndex:30}}>
        <div style={{maxWidth:1280,margin:'0 auto',padding:'14px 24px',display:'flex',alignItems:'center',justifyContent:'space-between',gap:12,flexWrap:'wrap'}}>
          <div style={{display:'flex',alignItems:'center',gap:16}}>
            {view==='patient' && (
              <button className="btn btn-ghost" style={{padding:'6px 10px'}} onClick={()=>{setView('list');setActiveId(null);}}>
                <I n="ChevronL"/> Lista
              </button>
            )}
            <div>
              <div className="eyebrow">Hematologia · Hospital 9 de Julho</div>
              <h1 className="serif" style={{fontSize:26,lineHeight:1.1,marginTop:2}}>Painel de pacientes</h1>
            </div>
          </div>
          <div style={{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}}>
            <button className="btn btn-ghost" style={{padding:'7px 10px'}} onClick={()=>setShowKey(true)} title="Configurar API Key Claude">
              <I n="Key"/>
              <span style={{fontSize:11}}>{apiKey ? 'Claude ✓' : 'Claude API'}</span>
            </button>
            {/* Botão de sincronização com pCloud */}
            <button
              className="btn btn-ghost"
              style={{padding:'7px 10px', color: syncColor}}
              onClick={()=>saveToFS(false)}
              title={syncTitle}
              disabled={fsSaving}
            >
              <I n={syncIcon} className={fsSaving?'spinner':undefined}/>
              <span style={{fontSize:11}}>{syncLabel}</span>
            </button>
            <button className="btn btn-secondary" onClick={()=>setShowImport(true)}><I n="Image"/> Importar print</button>
            <button className="btn btn-secondary" onClick={importFromJSON} title="Restaurar de backup JSON"><I n="Upload"/> Restaurar</button>
            <button className="btn btn-secondary" onClick={exportJSON} disabled={!patients.length}><I n="Down"/> JSON</button>
            <button className="btn btn-primary" onClick={()=>setShowAdd(true)}><I n="Plus"/> Novo paciente</button>
          </div>
        </div>
      </header>

      <main style={{maxWidth:1280,margin:'0 auto',padding:'24px'}}>
        {view === 'list' && <>
          {/* STATS */}
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(170px,1fr))',gap:12,marginBottom:20}}>
            <StatCard icon="Users"       label="Total"           value={stats.total} sub="pacientes únicos"/>
            <StatCard icon="Cal"         label="Consultados hoje" value={stats.hoje}  sub="passagens registradas" tint="var(--accent2)"/>
            <StatCard icon="Stethoscope" label="Diagnóstico top"  value={stats.topDx} sub={`${stats.topDxN} caso(s)`} text tint="var(--accent)"/>
            <StatCard icon="Building"    label="Convênio top"     value={stats.topCv} sub={`${stats.topCvN} paciente(s)`} text tint="var(--accent3)"/>
          </div>

          {/* TABS */}
          <div style={{display:'flex',gap:4,marginBottom:16}}>
            {['lista','graficos'].map(t=>(
              <button key={t} onClick={()=>setTab(t)} style={{
                padding:'6px 16px',borderRadius:6,fontSize:13,fontWeight:500,cursor:'pointer',border:'none',
                background:tab===t?'var(--ink)':'transparent',color:tab===t?'white':'var(--muted)',transition:'all .15s'
              }}>{t==='lista'?'Lista de pacientes':'Gráficos'}</button>
            ))}
          </div>

          {tab === 'lista' && <>
            <div className="card" style={{padding:16,marginBottom:16}}>
              <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(150px,1fr))',gap:10}}>
                <div>
                  <label className="label">Buscar</label>
                  <div style={{position:'relative'}}>
                    <span style={{position:'absolute',left:10,top:10,color:'var(--muted)',pointerEvents:'none'}}><I n="Search"/></span>
                    <input className="input" style={{paddingLeft:32}} placeholder="Nome…" value={search} onChange={e=>setSearch(e.target.value)}/>
                  </div>
                </div>
                {[['diagnostico','Diagnóstico'],['convenio','Convênio'],['tratamento','Tratamento'],['terapia','Terapia celular'],['status','Status']].map(([k,lbl])=>(
                  <div key={k}>
                    <label className="label">{lbl}</label>
                    <div style={{position:'relative'}}>
                      <select className="select" style={{appearance:'none',paddingRight:28}} value={filters[k]} onChange={e=>setFilters({...filters,[k]:e.target.value})}>
                        <option value="todos">{k==='terapia'?'Todas':'Todos'}</option>
                        {(k==='terapia'?TERAPIAS_OPTIONS:uniq(k)).map(o=><option key={o} value={o}>{o}</option>)}
                      </select>
                      <span style={{position:'absolute',right:8,top:10,pointerEvents:'none',color:'var(--muted)'}}><I n="Chevron"/></span>
                    </div>
                  </div>
                ))}
              </div>
              {hasFilter && (
                <div style={{marginTop:10,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                  <span style={{fontSize:12,color:'var(--muted)'}}>
                    <span className="mono" style={{color:'var(--ink)'}}>{filtered.length}</span> de {patients.length}
                  </span>
                  <button className="btn btn-ghost" style={{fontSize:12,padding:'4px 10px'}} onClick={()=>{setSearch('');setFilters({diagnostico:'todos',convenio:'todos',tratamento:'todos',terapia:'todos',status:'todos'});}}>
                    <I n="X" s={12}/> Limpar filtros
                  </button>
                </div>
              )}
            </div>

            <div className="card" style={{overflow:'hidden'}}>
              {patients.length === 0 ? (
                <div style={{padding:'60px 24px',textAlign:'center'}}>
                  <div className="serif" style={{fontSize:22,color:'var(--muted)',marginBottom:8}}>Nenhum paciente cadastrado</div>
                  <p style={{fontSize:13,color:'var(--muted)',marginBottom:16}}>Importe um print da agenda, restaure um backup ou adicione manualmente.</p>
                  <div style={{display:'flex',gap:8,justifyContent:'center'}}>
                    <button className="btn btn-primary" onClick={()=>setShowImport(true)}><I n="Image"/> Importar print</button>
                    <button className="btn btn-secondary" onClick={importFromJSON}><I n="Upload"/> Restaurar JSON</button>
                    <button className="btn btn-secondary" onClick={()=>setShowAdd(true)}><I n="Plus"/> Adicionar</button>
                  </div>
                </div>
              ) : filtered.length === 0 ? (
                <div style={{padding:40,textAlign:'center',color:'var(--muted)',fontSize:13}}>Nenhum paciente corresponde aos filtros.</div>
              ) : (
                <div style={{overflowX:'auto'}}>
                  <table>
                    <thead><tr>
                      {[['nome','Paciente'],['diagnostico','Diagnóstico'],['convenio','Convênio'],['tratamento','Tratamento'],['status','Status'],['ultimaConsulta','Última consulta'],['consultas','Consultas']].map(([key,lbl])=>(
                        <th key={key} onClick={()=>toggleSort(key)} style={{cursor:'pointer',userSelect:'none',whiteSpace:'nowrap'}} title="Ordenar">
                          {lbl}
                          <span style={{marginLeft:4,fontSize:9,color:sort.key===key?'var(--ink)':'var(--border)'}}>{sort.key===key?(sort.dir==='asc'?'▲':'▼'):'⇅'}</span>
                        </th>
                      ))}
                      <th style={{width:72}}></th>
                    </tr></thead>
                    <tbody>
                      {filtered.map(p=>(
                        <tr key={p.id} className="row-hover" onClick={()=>{setActiveId(p.id);setView('patient');}}>
                          <td>
                            <div style={{fontWeight:600,fontSize:13}}>{p.nome}</div>
                            {p.prontuario && <div className="mono" style={{fontSize:10,color:'var(--muted)',marginTop:2}}>#{p.prontuario}</div>}
                            {(p.terapias||[]).length>0 && (
                              <div style={{display:'flex',gap:4,flexWrap:'wrap',marginTop:3}}>
                                {p.terapias.map(t=><span key={t} className="pill" style={{...terapiaPill(t),fontSize:9,padding:'1px 6px'}}>{t}</span>)}
                              </div>
                            )}
                          </td>
                          <td style={{fontSize:13}}>{p.diagnostico||<span style={{color:'var(--muted)'}}>—</span>}</td>
                          <td style={{fontSize:13}}>{p.convenio||<span style={{color:'var(--muted)'}}>—</span>}</td>
                          <td style={{fontSize:12}}>{p.tratamento||<span style={{color:'var(--muted)'}}>—</span>}</td>
                          <td>{p.status?<span className="pill" style={statPill(p.status)}>{p.status}</span>:<span style={{color:'var(--muted)',fontSize:12}}>—</span>}</td>
                          <td className="mono" style={{fontSize:12}}>{p.ultimaConsulta?fmtDate(p.ultimaConsulta):'—'}</td>
                          <td>
                            <span style={{background:'var(--bg)',border:'1px solid var(--border)',borderRadius:999,padding:'2px 8px',fontSize:11,fontFamily:'JetBrains Mono,monospace'}}>
                              {(p.consultas||[]).length}
                            </span>
                          </td>
                          <td onClick={e=>e.stopPropagation()}>
                            <div style={{display:'flex',gap:4}}>
                              <button className="btn btn-ghost" style={{padding:6}} onClick={e=>{e.stopPropagation();setShowAdd(p);}} title="Editar"><I n="Edit" s={13}/></button>
                              <button className="btn btn-ghost" style={{padding:6,color:'var(--accent)'}} onClick={e=>{e.stopPropagation();if(confirm('Remover '+p.nome+'?'))deletePatient(p.id);}} title="Excluir"><I n="Trash" s={13}/></button>
                            </div>
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              )}
            </div>
          </>}

          {tab === 'graficos' && (
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
              <ChartCard title="Diagnósticos" icon="Stethoscope"
                action={hiddenDx.length>0 && (
                  <button onClick={()=>setHiddenDx([])} style={{fontSize:11,padding:'3px 8px',borderRadius:6,border:'1px solid var(--border)',background:'var(--bg)',color:'var(--muted)',cursor:'pointer'}}>
                    Mostrar todos
                  </button>
                )}>
                {charts.dx.length ? (() => {
                  const dxColor = (name) => PAL[charts.dx.findIndex(d=>d.name===name) % PAL.length];
                  const shown = charts.dx.filter(d => !hiddenDx.includes(d.name));
                  const toggleDx = (name) => setHiddenDx(h => h.includes(name) ? h.filter(x=>x!==name) : [...h, name]);
                  return (
                  <div style={{display:'flex',alignItems:'center',gap:8}}>
                    <div style={{flex:'0 0 55%'}}>
                      <ResponsiveContainer width="100%" height={240}>
                        <PieChart>
                          <Pie data={shown} dataKey="value" nameKey="name" cx="50%" cy="50%" outerRadius={80} innerRadius={40} paddingAngle={2}>
                            {shown.map((d,i)=><Cell key={i} fill={dxColor(d.name)} stroke="white" strokeWidth={2}/>)}
                          </Pie>
                          <Tooltip contentStyle={{fontSize:12,border:'1px solid var(--border)'}}/>
                        </PieChart>
                      </ResponsiveContainer>
                    </div>
                    <div style={{flex:1,maxHeight:240,overflowY:'auto',display:'flex',flexDirection:'column',gap:2,paddingRight:4}}>
                      {charts.dx.map(d=>{
                        const off = hiddenDx.includes(d.name);
                        return (
                          <button key={d.name} onClick={()=>toggleDx(d.name)} title={off?'Clique para mostrar':'Clique para ocultar'}
                            style={{display:'flex',alignItems:'center',gap:6,padding:'3px 6px',borderRadius:6,border:'none',background:'transparent',cursor:'pointer',textAlign:'left',width:'100%',opacity:off?0.4:1}}>
                            <span style={{width:10,height:10,borderRadius:3,flexShrink:0,background:off?'transparent':dxColor(d.name),border:`2px solid ${dxColor(d.name)}`}}/>
                            <span style={{fontSize:11,flex:1,textDecoration:off?'line-through':'none',color:'var(--ink)'}}>{d.name}</span>
                            <span className="mono" style={{fontSize:11,color:'var(--muted)'}}>{d.value}</span>
                          </button>
                        );
                      })}
                    </div>
                  </div>
                  );
                })() : <Empty/>}
              </ChartCard>
              <ChartCard title="Convênios" icon="Building">
                {charts.conv.length ? (
                  <ResponsiveContainer width="100%" height={240}>
                    <BarChart data={charts.conv} layout="vertical" margin={{left:60}}>
                      <CartesianGrid strokeDasharray="3 3" stroke="var(--border)" horizontal={false}/>
                      <XAxis type="number" tick={{fontSize:11,fill:'var(--muted)'}}/>
                      <YAxis type="category" dataKey="name" tick={{fontSize:11}} width={120}/>
                      <Tooltip contentStyle={{fontSize:12,border:'1px solid var(--border)'}}/>
                      <Bar dataKey="value" fill="#2D5F7C" radius={[0,4,4,0]}/>
                    </BarChart>
                  </ResponsiveContainer>
                ) : <Empty/>}
              </ChartCard>
              <ChartCard title="Tratamentos" icon="Pill">
                {charts.trat.length ? (
                  <ResponsiveContainer width="100%" height={240}>
                    <BarChart data={charts.trat} margin={{bottom:32}}>
                      <CartesianGrid strokeDasharray="3 3" stroke="var(--border)" vertical={false}/>
                      <XAxis dataKey="name" tick={{fontSize:10,fill:'var(--muted)'}} angle={-30} textAnchor="end"/>
                      <YAxis tick={{fontSize:11,fill:'var(--muted)'}}/>
                      <Tooltip contentStyle={{fontSize:12,border:'1px solid var(--border)'}}/>
                      <Bar dataKey="value" fill="#5C7A6B" radius={[4,4,0,0]}/>
                    </BarChart>
                  </ResponsiveContainer>
                ) : <Empty/>}
              </ChartCard>
              <ChartCard title="Terapias celulares / transplantes" icon="Activity">
                {charts.ter.length ? (
                  <ResponsiveContainer width="100%" height={240}>
                    <BarChart data={charts.ter} margin={{bottom:8}}>
                      <CartesianGrid strokeDasharray="3 3" stroke="var(--border)" vertical={false}/>
                      <XAxis dataKey="name" tick={{fontSize:11,fill:'var(--muted)'}}/>
                      <YAxis tick={{fontSize:11,fill:'var(--muted)'}} allowDecimals={false}/>
                      <Tooltip contentStyle={{fontSize:12,border:'1px solid var(--border)'}}/>
                      <Bar dataKey="value" radius={[4,4,0,0]}>
                        {charts.ter.map((d,i)=><Cell key={i} fill={(TC[d.name]||['#ccc','#5C3A7A'])[1]}/>)}
                      </Bar>
                    </BarChart>
                  </ResponsiveContainer>
                ) : <Empty/>}
              </ChartCard>
              <ChartCard title={consultaPeriod==='mes'?'Consultas por mês':'Consultas por semana'} icon="Activity"
                action={
                  <div style={{display:'flex',gap:2,background:'var(--bg)',border:'1px solid var(--border)',borderRadius:8,padding:2}}>
                    {[['mes','Mês'],['semana','Semana']].map(([v,lbl])=>(
                      <button key={v} onClick={()=>setConsultaPeriod(v)} style={{
                        fontSize:11,padding:'3px 10px',borderRadius:6,border:'none',cursor:'pointer',
                        background:consultaPeriod===v?'var(--ink)':'transparent',color:consultaPeriod===v?'white':'var(--muted)',
                        fontWeight:consultaPeriod===v?600:400,transition:'all .15s'}}>{lbl}</button>
                    ))}
                  </div>
                }>
                {(consultaPeriod==='mes'?charts.mes:charts.semana).length ? (
                  <ResponsiveContainer width="100%" height={240}>
                    <LineChart data={consultaPeriod==='mes'?charts.mes:charts.semana}>
                      <CartesianGrid strokeDasharray="3 3" stroke="var(--border)"/>
                      <XAxis dataKey="name" tick={{fontSize:11,fill:'var(--muted)'}}/>
                      <YAxis tick={{fontSize:11,fill:'var(--muted)'}} allowDecimals={false}/>
                      <Tooltip contentStyle={{fontSize:12,border:'1px solid var(--border)'}} labelFormatter={l=>consultaPeriod==='semana'?`Semana de ${l}`:l}/>
                      <Line type="monotone" dataKey="value" stroke="var(--accent)" strokeWidth={2} dot={{fill:'var(--accent)',r:4}}/>
                    </LineChart>
                  </ResponsiveContainer>
                ) : <Empty/>}
              </ChartCard>
            </div>
          )}

          <div style={{marginTop:16,textAlign:'center',fontSize:11,color:'var(--muted)'}}>
            <span className="mono">{patients.length}</span> pacientes · dados salvos no navegador
            {fsGranted && lastSync && <> · sincronizado às <span className="mono">{fmtHM(lastSync)}</span></>}
            {syncPending && <> · <span style={{color:'#B8860B'}}>sincronização pendente — clique no botão pCloud</span></>}
          </div>
        </>}

        {view === 'patient' && activePatient && (
          <PatientDetail
            patient={activePatient}
            onEdit={() => setShowAdd(activePatient)}
            onDelete={() => deletePatient(activePatient.id)}
            onAddConsulta={(c) => addConsulta(activePatient.id, c)}
            onEditConsulta={(c) => editConsulta(activePatient.id, c)}
            onDeleteConsulta={(cid) => deleteConsulta(activePatient.id, cid)}
          />
        )}
      </main>

      {/* MODALS */}
      {showAdd && (
        <PatientForm
          patient={typeof showAdd === 'object' && showAdd.id ? showAdd : null}
          onSave={savePatient}
          onClose={()=>setShowAdd(false)}
          existing={{diagnosticos:uniq('diagnostico'),convenios:uniq('convenio'),tratamentos:uniq('tratamento')}}
        />
      )}
      {showImport && (
        <ImportModal
          apiKey={apiKey}
          onDone={(extracted) => {
            const {added, updated} = upsertFromAgenda(extracted);
            setShowImport(false);
            msg(`${added} novo(s) + ${updated} atualizado(s)`);
          }}
          onClose={()=>setShowImport(false)}
          onNeedKey={()=>{setShowImport(false);setShowKey(true);}}
        />
      )}
      {showKey && <ApiKeyModal apiKey={apiKey} onSave={(k)=>{saveKey(k);setApiKey(k);setShowKey(false);msg('Claude API Key salva');}} onClose={()=>setShowKey(false)}/>}

      {toast && (
        <div style={{
          position:'fixed',bottom:24,right:24,
          background:toast.type==='err'?'#7B1F2E':'var(--ink)',
          color:'white',padding:'10px 16px',borderRadius:6,fontSize:13,
          boxShadow:'0 8px 24px rgba(0,0,0,0.18)',zIndex:100,
          display:'flex',alignItems:'center',gap:8
        }}>
          {toast.type==='err' && <I n="Alert"/>}
          {toast.type==='ok' && <I n="Check"/>}
          {toast.m}
        </div>
      )}
    </div>
  );
}

// ─── Import Modal ─────────────────────────────────────────
function ImportModal({ apiKey, onDone, onClose, onNeedKey }) {
  const [stage, setStage]         = useState('drop');
  const [dragging, setDragging]   = useState(false);
  const [loading, setLoading]     = useState(false);
  const [loadMsg, setLoadMsg]     = useState('');
  const [extracted, setExtracted] = useState([]);
  const [error, setError]         = useState('');
  const fileRef = useRef();

  const processFiles = async (files) => {
    if (!apiKey) { onNeedKey(); return; }
    setLoading(true); setError('');
    setLoadMsg(`Processando ${files.length} imagem(ns)…`);
    try {
      const isHeic = (f) => /image\/(heic|heif)/i.test(f.type) || /\.(heic|heif)$/i.test(f.name);
      const convertToJpeg = async (file) => {
        // O Chrome não decodifica HEIC via <img>; converte para JPEG antes.
        let src = file;
        if (isHeic(file)) {
          try {
            src = await HeicTo({ blob: file, type: 'image/jpeg', quality: 0.92 });
          } catch (err) {
            console.error('HeicTo falhou em', file.name, err);
            const msg = (err && (err.message || err.code)) || String(err);
            throw new Error('Falha ao converter HEIC: ' + file.name + (msg ? ' (' + msg + ')' : ''));
          }
        }
        return new Promise((res, rej) => {
          const reader = new FileReader();
          reader.onerror = () => rej(new Error('Erro ao ler ' + file.name));
          reader.onload = (e) => {
            const img = new Image();
            img.onerror = () => rej(new Error('Formato não suportado: ' + file.name));
            img.onload = () => {
              const canvas = document.createElement('canvas');
              const max = 2400; let w = img.width, h = img.height;
              if (w > max || h > max) { if (w > h) { h = Math.round(h*max/w); w=max; } else { w=Math.round(w*max/h); h=max; } }
              canvas.width = w; canvas.height = h;
              canvas.getContext('2d').drawImage(img, 0, 0, w, h);
              const dataUrl = canvas.toDataURL('image/jpeg', 0.92);
              res({ b64: dataUrl.split(',')[1], mt: 'image/jpeg' });
            };
            img.src = e.target.result;
          };
          reader.readAsDataURL(src);
        });
      };
      setLoadMsg(`Convertendo imagens…`);
      const converted = await Promise.all(files.map(convertToJpeg));
      setLoadMsg(`Enviando ${files.length} print(s) para Claude…`);
      const results = await Promise.all(converted.map(({ b64, mt }) => extractPatientsFromImage(b64, mt, apiKey)));
      const seen = new Set(); const merged = [];
      for (const arr of results) for (const p of arr) {
        const key = normName(p.nome) + '|' + (p.atendimento || '');
        if (!seen.has(key)) { seen.add(key); merged.push(p); }
      }
      setExtracted(merged); setStage('preview');
    } catch(e) { setError('Erro: ' + e.message); }
    finally { setLoading(false); setLoadMsg(''); }
  };

  const onDrop = (e) => {
    e.preventDefault(); setDragging(false);
    const files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/') || f.name.match(/\.(heic|heif)$/i));
    if (files.length) processFiles(files);
  };

  const editRow = (i, k, v) => setExtracted(prev => prev.map((r,j)=>j===i?{...r,[k]:v}:r));
  const removeRow = (i) => setExtracted(prev => prev.filter((_,j)=>j!==i));

  return (
    <Modal title="Importar agenda" onClose={onClose} wide>
      {!apiKey && (
        <div style={{background:'#FEF5E7',border:'1px solid #F0D080',borderRadius:6,padding:'10px 14px',marginBottom:16,fontSize:13,color:'#7A5200',display:'flex',gap:8,alignItems:'center'}}>
          <I n="Alert" s={14}/><span>Configure a <strong>API Key</strong> do Claude para extração automática.</span>
          <button className="btn btn-secondary" style={{marginLeft:'auto',fontSize:12,padding:'4px 10px'}} onClick={onNeedKey}>Configurar</button>
        </div>
      )}
      {stage === 'drop' && (
        <>
          <div className={`dropzone${dragging?' drag-over':''}`} style={{padding:'48px 24px',textAlign:'center',marginBottom:16}}
            onDragOver={e=>{e.preventDefault();setDragging(true);}} onDragLeave={()=>setDragging(false)}
            onDrop={onDrop} onClick={()=>fileRef.current.click()}>
            {loading ? (
              <div style={{color:'var(--muted)'}}>
                <I n="Loader" s={32} className="spinner" style={{display:'block',margin:'0 auto 12px',color:'var(--accent2)'}}/>
                <div style={{fontSize:14,fontWeight:500}} className="pulse">{loadMsg}</div>
              </div>
            ) : (
              <>
                <I n="Image" s={36} style={{color:'var(--muted)',display:'block',margin:'0 auto 12px'}}/>
                <div className="serif" style={{fontSize:20,marginBottom:6}}>Arraste o print aqui</div>
                <div style={{fontSize:13,color:'var(--muted)'}}>ou clique para selecionar · JPG, PNG, HEIC · pode selecionar várias</div>
              </>
            )}
          </div>
          <input ref={fileRef} type="file" accept="image/*,.heic,.heif" multiple style={{display:'none'}} onChange={e=>{ const files=Array.from(e.target.files); if(files.length) processFiles(files); }}/>
          {error && <div style={{background:'#FBEEF0',color:'var(--accent)',padding:'10px 14px',borderRadius:6,fontSize:13,marginBottom:12}}>{error}</div>}
        </>
      )}
      {stage === 'preview' && (
        <>
          <div style={{background:'#EAF1EC',color:'#2D5F38',padding:'8px 14px',borderRadius:6,marginBottom:14,fontSize:13,display:'flex',gap:6,alignItems:'center'}}>
            <I n="Check" s={13}/> {extracted.length} paciente(s) extraído(s). Revise antes de importar.
          </div>
          <div style={{overflowX:'auto',marginBottom:16}}>
            <table>
              <thead><tr><th>Nome</th><th>Prontuário</th><th>Atendimento</th><th>Data</th><th>Hora</th><th style={{width:40}}></th></tr></thead>
              <tbody>
                {extracted.map((r,i)=>(
                  <tr key={i}>
                    <td><input className="input" value={r.nome||''} onChange={e=>editRow(i,'nome',e.target.value)} style={{minWidth:200}}/></td>
                    <td><input className="input" value={r.prontuario||''} onChange={e=>editRow(i,'prontuario',e.target.value)} style={{width:90}}/></td>
                    <td><input className="input" value={r.atendimento||''} onChange={e=>editRow(i,'atendimento',e.target.value)} style={{width:90}}/></td>
                    <td><input className="input" type="date" value={r.data||today()} onChange={e=>editRow(i,'data',e.target.value)} style={{width:130}}/></td>
                    <td><input className="input" type="time" value={r.hora||''} onChange={e=>editRow(i,'hora',e.target.value)} style={{width:90}}/></td>
                    <td><button className="btn btn-ghost" style={{padding:5,color:'var(--accent)'}} onClick={()=>removeRow(i)}><I n="X" s={12}/></button></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <button className="btn btn-ghost" onClick={()=>setStage('drop')}>← Voltar</button>
            <button className="btn btn-primary" onClick={()=>onDone(extracted)} disabled={!extracted.length}>
              <I n="Merge"/> Importar {extracted.length} paciente(s)
            </button>
          </div>
        </>
      )}
    </Modal>
  );
}

  return (
    <div className="card" style={{padding:16}}>
      <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:8}}>
        <span style={{color:tint||'var(--accent)'}}><I n={icon} s={13}/></span>
        <span className="eyebrow">{label}</span>
      </div>
      <div className={text?'serif':'mono'} style={{fontSize:text?18:28,lineHeight:1.1,fontWeight:text?400:500,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{value}</div>
      <div style={{fontSize:11,color:'var(--muted)',marginTop:4}}>{sub}</div>
    </div>
  );
}
function ChartCard({ title, icon, children, action }) {
  return (
    <div className="card" style={{padding:16}}>
      <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:12}}>
        <span style={{color:'var(--muted)'}}><I n={icon} s={12}/></span>
        <span className="eyebrow">{title}</span>
        {action && <div style={{marginLeft:'auto'}}>{action}</div>}
      </div>
      {children}
    </div>
  );
}
const Empty = () => <div style={{height:240,display:'flex',alignItems:'center',justifyContent:'center',color:'var(--muted)',fontSize:12}}>Sem dados</div>;
function Modal({ title, children, onClose, wide }) {
  return (
    <div onClick={onClose} style={{position:'fixed',inset:0,background:'rgba(26,31,44,.5)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:50,padding:16}}>
      <div onClick={e=>e.stopPropagation()} style={{background:'white',borderRadius:10,width:wide?740:520,maxWidth:'100%',maxHeight:'90vh',overflowY:'auto',boxShadow:'0 20px 60px rgba(0,0,0,.2)'}}>
        <div style={{padding:'16px 20px',display:'flex',alignItems:'center',justifyContent:'space-between',borderBottom:'1px solid var(--border)'}}>
          <h3 className="serif" style={{fontSize:22}}>{title}</h3>
          <button className="btn btn-ghost" style={{padding:6}} onClick={onClose}><I n="X" s={16}/></button>
        </div>
        <div style={{padding:20}}>{children}</div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

<!-- Guarda de tela branca: roda fora do Babel, então funciona mesmo se a transpilação falhar.
     Se o #root continuar vazio após alguns segundos, mostra um aviso em vez de uma tela branca muda. -->
<script>
(function () {
  function checkRender() {
    var root = document.getElementById('root');
    if (root && root.children.length > 0) return; // app montou normalmente

    var missing = [];
    if (typeof React === 'undefined') missing.push('React');
    if (typeof ReactDOM === 'undefined') missing.push('ReactDOM');
    if (typeof Recharts === 'undefined') missing.push('Recharts');
    if (typeof Babel === 'undefined') missing.push('Babel');
    var detail = missing.length
      ? 'Scripts que não carregaram: ' + missing.join(', ') + '.'
      : 'Os scripts carregaram, mas o app não montou (provável erro de transpilação/JSX).';

    root.innerHTML =
      '<div style="max-width:560px;margin:80px auto;padding:24px 28px;font-family:system-ui,sans-serif;' +
      'border:1px solid #E5E0D8;border-radius:8px;background:#fff;color:#1A1F2C;line-height:1.5">' +
      '<h1 style="font-size:18px;margin-bottom:10px">O painel não carregou</h1>' +
      '<p style="color:#6B7280;font-size:14px;margin-bottom:12px">' + detail + '</p>' +
      '<p style="font-size:14px;margin-bottom:8px"><b>Tente:</b></p>' +
      '<ol style="font-size:14px;color:#1A1F2C;padding-left:20px;margin-bottom:12px">' +
      '<li>Recarregar sem cache: <b>Cmd+Shift+R</b></li>' +
      '<li>Confirmar que os arquivos em <code>vendor/</code> existem ao lado do HTML</li>' +
      '<li>Abrir o console (<b>Cmd+Option+J</b>) e ver as linhas em vermelho</li>' +
      '</ol>' +
      '<p style="font-size:12px;color:#6B7280">Seus dados não foram perdidos — ficam salvos no navegador (localStorage) e no pacientes.json.</p>' +
      '</div>';
  }
  // Dá tempo de o Babel transpilar e o React montar antes de decidir que falhou.
  window.addEventListener('load', function () { setTimeout(checkRender, 4000); });
})();
</script>
</body>
</html>
